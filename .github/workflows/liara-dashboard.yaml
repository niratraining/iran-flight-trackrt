name: CD-Liara-iran-flight-trackrt-dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Deploy to Liara
        env:
          LIARA_TOKEN: ${{ secrets.LIARA_API_TOKEN }}
        run: |
          npm i -g @liara/cli@9
          liara deploy --path=dashboard --app="iran-flight-trackrt-dashboard" --api-token="$LIARA_TOKEN" --no-app-logs
