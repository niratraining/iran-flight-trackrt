name = "iran-flight-trackrt"
main = "worker.js"
compatibility_date = "2026-07-01"

[triggers]
# 08:00 Tehran (THR+IKA) | 09:00 Tehran (other 18 airports) | 16:00 Tehran (THR+IKA)
# 23:30 Tehran (daily reliability aggregation + rolling score update)
crons = ["30 4 * * *", "30 5 * * *", "30 12 * * *", "0 20 * * *"]

[[kv_namespaces]]
binding = "FLIGHTS_KV"
id = "2b0a55517b5a466dbb6b896275f02494"
