name = "iran-flight-trackrt"
main = "worker.js"
compatibility_date = "2026-07-01"

[triggers]
# 23:59 Tehran (20:29 UTC, Tehran has no DST) -> single nightly run:
# fetch all 20 airports' full-day flight data, then aggregate daily stats,
# classify routes (Mondays), and recompute rolling reliability scores.
crons = ["29 20 * * *"]

[[kv_namespaces]]
binding = "FLIGHTS_KV"
id = "2b0a55517b5a466dbb6b896275f02494"
